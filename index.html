<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SGX | 6-Face Skybox Scanner</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background-color: #000; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
    
    /* UI SGX - Panel de Control Flotante */
    #dashboard {
      position: absolute;
      top: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(50, 82, 123, 0.9); /* Azul SGX */
      border: 1px solid #FDCC0D; /* Amarillo SGX */
      padding: 15px; border-radius: 8px; z-index: 1000;
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      backdrop-filter: blur(10px);
      width: 90%; max-width: 400px;
    }

    .sgx-title { grid-column: span 2; color: #FDCC0D; text-align: center; margin: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 2px;}
    .sgx-subtitle { grid-column: span 2; color: #FFF; text-align: center; margin: 0 0 10px 0; font-size: 10px; }

    /* Botones de Captura */
    .face-btn {
      position: relative; overflow: hidden;
      background: #000; border: 1px solid #FDCC0D; color: #FDCC0D;
      padding: 12px 5px; text-align: center; font-weight: bold; font-size: 11px;
      border-radius: 4px; cursor: pointer; text-transform: uppercase;
    }
    .face-btn input[type="file"] {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer;
    }
    .face-btn.loaded { background: #FDCC0D; color: #000; }
    .face-btn.loading { background: #888; color: #FFF; border-color: #888; }

    #toggle-ui {
      grid-column: span 2; background: transparent; border: 1px dashed #FDCC0D;
      color: #FFF; padding: 8px; text-align: center; border-radius: 4px; cursor: pointer; font-size: 10px; margin-top: 5px;
    }
  </style>
</head>
<body>

  <div id="dashboard">
    <h1 class="sgx-title">SGX Skybox 6D</h1>
    <p class="sgx-subtitle">Lente 0.5x. Gira 90° por foto.</p>
    
    <!-- Polos -->
    <div class="face-btn" id="btn-top">
      Techo (Cenit)
      <input type="file" accept="image/*" capture="environment" data-target="#plane-top" data-btn="#btn-top">
    </div>
    <div class="face-btn" id="btn-bottom">
      Piso (Nadir)
      <input type="file" accept="image/*" capture="environment" data-target="#plane-bottom" data-btn="#btn-bottom">
    </div>

    <!-- Eje Horizontal -->
    <div class="face-btn" id="btn-front">
      Norte (Frente)
      <input type="file" accept="image/*" capture="environment" data-target="#plane-front" data-btn="#btn-front">
    </div>
    <div class="face-btn" id="btn-back">
      Sur (Atrás)
      <input type="file" accept="image/*" capture="environment" data-target="#plane-back" data-btn="#btn-back">
    </div>
    <div class="face-btn" id="btn-right">
      Este (Derecha)
      <input type="file" accept="image/*" capture="environment" data-target="#plane-right" data-btn="#btn-right">
    </div>
    <div class="face-btn" id="btn-left">
      Oeste (Izquierda)
      <input type="file" accept="image/*" capture="environment" data-target="#plane-left" data-btn="#btn-left">
    </div>
    
    <div id="toggle-ui" onclick="document.getElementById('dashboard').style.display='none'">[ Ocultar UI (Doble tap para volver) ]</div>
  </div>

  <a-scene xr-mode-ui="enabled: false">
    <!-- Assets Manager: Inyectaremos el Base64 aquí para que WebGL lo lea nativo -->
    <a-assets id="asset-manager">
      <img id="tex-front" src="">
      <img id="tex-back" src="">
      <img id="tex-right" src="">
      <img id="tex-left" src="">
      <img id="tex-top" src="">
      <img id="tex-bottom" src="">
    </a-assets>

    <a-camera position="0 0 0" look-controls="reverseMouseDrag: true"></a-camera>

    <!-- 
      Arquitectura del Cubo 6D:
      Las rotaciones están calculadas para que las normales miren hacia el centro (0,0,0).
      Evitamos el "side: back" para prevenir inversiones de UV (efecto espejo).
    -->
    <a-entity id="skybox" position="0 0 0">
      <!-- Paredes (Eje Y) -->
      <a-plane id="plane-front" position="0 0 -50" rotation="0 0 0" width="100" height="100" material="shader: flat; color: #111"></a-plane>
      <a-plane id="plane-back" position="0 0 50" rotation="0 180 0" width="100" height="100" material="shader: flat; color: #111"></a-plane>
      <a-plane id="plane-right" position="50 0 0" rotation="0 -90 0" width="100" height="100" material="shader: flat; color: #111"></a-plane>
      <a-plane id="plane-left" position="-50 0 0" rotation="0 90 0" width="100" height="100" material="shader: flat; color: #111"></a-plane>
      
      <!-- Polos (Eje X) -->
      <!-- Rotamos 90 en X para mirar abajo hacia el usuario, y -90 en X para mirar arriba -->
      <a-plane id="plane-top" position="0 50 0" rotation="90 0 0" width="100" height="100" material="shader: flat; color: #222"></a-plane>
      <a-plane id="plane-bottom" position="0 -50 0" rotation="-90 0 0" width="100" height="100" material="shader: flat; color: #222"></a-plane>
    </a-entity>

  </a-scene>

  <script>
    document.body.addEventListener('dblclick', () => {
      document.getElementById('dashboard').style.display = 'grid';
    });

    document.querySelectorAll('input[type="file"]').forEach(input => bindInput(input));

    function bindInput(input) {
      input.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const targetPlaneId = this.getAttribute('data-target');
        const btnId = this.getAttribute('data-btn');
        const plane = document.querySelector(targetPlaneId);
        const btn = document.querySelector(btnId);
        
        // Extraemos el ID del asset correspondiente (ej. de "#plane-front" a "tex-front")
        const assetId = targetPlaneId.replace('#plane-', 'tex-');
        const imgAsset = document.getElementById(assetId);

        // Feedback Visual de Carga
        btn.classList.remove('loaded');
        btn.classList.add('loading');
        btn.innerHTML = 'Procesando...';

        // EL HACK DE SISTEMAS: Usamos FileReader para forzar la lectura del archivo a memoria Base64.
        // Esto puentea el bloqueo de CORS de iOS Safari para texturas locales.
        const reader = new FileReader();
        
        reader.onload = function(e) {
          const base64Data = e.target.result;
          
          // 1. Inyectamos la data pura al Asset Manager
          imgAsset.src = base64Data;
          
          // 2. Le decimos al plano que lea ese asset. A-Frame actualiza el WebGL automáticamente.
          plane.setAttribute('material', `src: #${assetId}; shader: flat; color: #FFF`);
          
          // 3. UI Status Update
          btn.classList.remove('loading');
          btn.classList.add('loaded');
          
          // Re-renderizamos el input para permitir sobrescribir la foto si quedó mal
          btn.innerHTML = `✅ ${btnId.replace('#btn-', '').toUpperCase()} <input type="file" accept="image/*" capture="environment" data-target="${targetPlaneId}" data-btn="${btnId}">`;
          bindInput(btn.querySelector('input'));
        };

        // Comienza la trituración del archivo
        reader.readAsDataURL(file);
      });
    }
  </script>
</body>
</html>
