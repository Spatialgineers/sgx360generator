<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SGX | Cubemap Spatial Scanner</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background-color: #000; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
    
    /* UI SGX - Panel de Control Flotante */
    #dashboard {
      position: absolute;
      top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(50, 82, 123, 0.9); /* Azul SGX */
      border: 1px solid #FDCC0D; /* Amarillo SGX */
      padding: 15px; border-radius: 8px; z-index: 1000;
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      backdrop-filter: blur(10px);
      width: 90%; max-width: 400px;
    }

    .sgx-title { grid-column: span 2; color: #FDCC0D; text-align: center; margin: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 2px;}
    .sgx-subtitle { grid-column: span 2; color: #FFF; text-align: center; margin: 0 0 10px 0; font-size: 10px; }

    /* Botones de Captura (Invocan la cámara nativa del iPhone directo) */
    .face-btn {
      position: relative; overflow: hidden;
      background: #000; border: 1px solid #FDCC0D; color: #FDCC0D;
      padding: 10px; text-align: center; font-weight: bold; font-size: 12px;
      border-radius: 4px; cursor: pointer; text-transform: uppercase;
    }
    .face-btn input[type="file"] {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer;
    }
    .face-btn.loaded { background: #FDCC0D; color: #000; }

    /* Botón para ocultar UI y ver el resultado */
    #toggle-ui {
      grid-column: span 2; background: transparent; border: 1px dashed #FDCC0D;
      color: #FFF; padding: 8px; text-align: center; border-radius: 4px; cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Dashboard de Captura Modular -->
  <div id="dashboard">
    <h1 class="sgx-title">SGX Skybox Scanner</h1>
    <p class="sgx-subtitle">Toma 4 fotos rotando 90° con tu lente Ultrawide (0.5x)</p>
    
    <div class="face-btn" id="btn-front">
      Norte (Frente)
      <!-- El atributo 'capture="environment"' abre la cámara directamente en iOS sin pasar por la galería -->
      <input type="file" accept="image/*" capture="environment" data-target="#plane-front" data-btn="#btn-front">
    </div>
    <div class="face-btn" id="btn-right">
      Este (Derecha)
      <input type="file" accept="image/*" capture="environment" data-target="#plane-right" data-btn="#btn-right">
    </div>
    <div class="face-btn" id="btn-back">
      Sur (Atrás)
      <input type="file" accept="image/*" capture="environment" data-target="#plane-back" data-btn="#btn-back">
    </div>
    <div class="face-btn" id="btn-left">
      Oeste (Izquierda)
      <input type="file" accept="image/*" capture="environment" data-target="#plane-left" data-btn="#btn-left">
    </div>
    
    <div id="toggle-ui" onclick="document.getElementById('dashboard').style.display='none'">[ Ocultar UI (Doble tap en pantalla para volver) ]</div>
  </div>

  <!-- Motor WebXR (El Cuarto Digital) -->
  <a-scene xr-mode-ui="enabled: false">
    
    <!-- Centro de la cámara -->
    <a-camera position="0 0 0" look-controls="reverseMouseDrag: true"></a-camera>

    <!-- 
      Arquitectura del Cubo:
      Dimensiones masivas (100x100) para evitar que la cámara las atraviese.
      Material "side: back" para que la textura se vea desde adentro hacia afuera.
    -->
    <a-entity id="skybox" position="0 0 0">
      <!-- Norte -->
      <a-plane id="plane-front" position="0 0 -50" width="100" height="100" material="shader: flat; side: back; color: #111"></a-plane>
      <!-- Sur -->
      <a-plane id="plane-back" position="0 0 50" rotation="0 180 0" width="100" height="100" material="shader: flat; side: back; color: #111"></a-plane>
      <!-- Este -->
      <a-plane id="plane-right" position="50 0 0" rotation="0 -90 0" width="100" height="100" material="shader: flat; side: back; color: #111"></a-plane>
      <!-- Oeste -->
      <a-plane id="plane-left" position="-50 0 0" rotation="0 90 0" width="100" height="100" material="shader: flat; side: back; color: #111"></a-plane>
      
      <!-- Techo y Piso (Opcionales, oscuros por defecto para dar profundidad) -->
      <a-plane position="0 50 0" rotation="-90 0 0" width="100" height="100" material="shader: flat; side: back; color: #050505"></a-plane>
      <a-plane position="0 -50 0" rotation="90 0 0" width="100" height="100" material="shader: flat; side: back; color: #050505"></a-plane>
    </a-entity>

  </a-scene>

  <!-- Lógica de Inyección de Píxeles -->
  <script>
    // Mostrar UI de nuevo con doble tap en la pantalla
    document.body.addEventListener('dblclick', () => {
      document.getElementById('dashboard').style.display = 'grid';
    });

    // Procesar las fotos instantáneamente desde la RAM del celular
    document.querySelectorAll('input[type="file"]').forEach(input => {
      input.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
          const targetPlaneId = this.getAttribute('data-target');
          const btnId = this.getAttribute('data-btn');
          const plane = document.querySelector(targetPlaneId);
          const btn = document.querySelector(btnId);

          // Crear URL local sin subir al servidor
          const objectURL = URL.createObjectURL(file);
          
          // Inyectar textura WebGL en la pared correspondiente
          plane.setAttribute('material', `src: ${objectURL}; shader: flat; color: #FFF; side: back`);
          
          // Cambiar estado de la UI (Feedback visual)
          btn.classList.add('loaded');
          btn.innerHTML = '✅ Cargado <input type="file" accept="image/*" capture="environment" data-target="'+targetPlaneId+'" data-btn="'+btnId+'">';
          
          // Re-vincular el listener al nuevo input (para permitir sobrescribir)
          bindInput(btn.querySelector('input'));
        }
      });
    });

    function bindInput(input) {
       input.addEventListener('change', function(event) {
          // Lógica idéntica arriba para reemplazos.
          const file = event.target.files[0];
          if(file) {
             const targetPlaneId = this.getAttribute('data-target');
             const plane = document.querySelector(targetPlaneId);
             const objectURL = URL.createObjectURL(file);
             plane.setAttribute('material', `src: ${objectURL}; shader: flat; color: #FFF; side: back`);
          }
       });
    }
  </script>
</body>
</html>
